<!DOCTYPE html>
<HTML>
    <head>
        <title>CURRENCY EXCHANGE</title>
        <link rel="stylesheet" href="CSS/Currency.css"/>

    </head>
    <body>
        <div class="all-content">
            <div class="top">
                <h1 class="currency">CURRENCY EXCHANGE</h1>
                <br>
            </div>
            <div class="form">
                <div class="mini">
                <label class="amount">Amount : </label>
                <input type="number" class="amount-currency"/>
                <label >From : </label>
                <input type="text" class="form-currency"/>
                <label>To : </label>
                <input type="text" class="to-currency"/>
                </div>
                <div class="large">
                <label class="output"></label>
                </div>
            </div>
            <div class="actions">
                <button class="convert">Convert</button>
            </div>
        </div>
        <script src="js/currency api .js"></script>
    </body>
</HTML>
